name: Build Android APK From Fixed Folder

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk-fixed:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    defaults:
      run:
        working-directory: challenge2_file_fast_transfer

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip build-essential ccache \
            python3-pip python3-venv \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python3 -m pip install --user --upgrade pip setuptools wheel
          python3 -m pip install --user --upgrade buildozer cython virtualenv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify fixed source is used
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path("main.py").read_text(encoding="utf-8")
          required = ["ANDROID_SAFE_UPLOAD_PORT", "open_android_safe_upload_picker", "ANDROID_SAFE_UPLOAD_HTML"]
          missing = [item for item in required if item not in source]
          if missing:
              raise SystemExit(f"Fixed Android safe upload code is missing: {missing}")
          print("Fixed main.py confirmed.")
          PY

      - name: Build debug APK from fixed folder
        run: buildozer android debug

      - name: Upload fixed APK
        uses: actions/upload-artifact@v4
        with:
          name: BeiyangFlash-fixed-debug-apk
          path: challenge2_file_fast_transfer/bin/*.apk
          if-no-files-found: error
